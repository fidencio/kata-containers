name: CI | Nydus-snapshotter stability test
on:
  schedule:
    - cron: "0 */1 * * *"  # Every hour
  workflow_dispatch:

permissions: {}

# Long-running stability test for nydus-snapshotter on pre-deployed Kata runners.
# Tests both patched and non-patched versions to compare behavior.
jobs:
  stability-test:
    name: stability-${{ matrix.environment.variant }}
    strategy:
      fail-fast: false
      matrix:
        environment: [
          { variant: patched, runner: nydus-longrun-patched, kata-deploy-tag: nydus-latest-patched },
          { variant: non-patched, runner: nydus-longrun-non-patched, kata-deploy-tag: nydus-latest-non-patched },
        ]
    runs-on: ${{ matrix.environment.runner }}
    env:
      KATA_HYPERVISOR: qemu-coco-dev
      KUBERNETES: vanilla
      SNAPSHOTTER: nydus
      # Note: Images must have basic shell utilities (uname). Distroless/scratch images won't work.
      # Using SHA256 digests for reproducibility.
      IMAGES_LIST: quay.io/mongodb/mongodb-community-server@sha256:8b73733842da21b6bbb6df4d7b2449229bb3135d2ec8c6880314d88205772a11 ghcr.io/edgelesssys/redis@sha256:ecb0a964c259a166a1eb62f0eb19621d42bd1cce0bc9bb0c71c828911d4ba93d
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Rotate the journal
        run: sudo journalctl --rotate --vacuum-time 1s

      - name: Run pods with Kata (nydus snapshotter)
        run: bash tests/integration/kubernetes/nydus_snapshotter_battle_tests.sh run-kata-pods kata kata-qemu-coco-dev

      - name: Run pods with runc (overlayfs snapshotter)
        run: bash tests/integration/kubernetes/nydus_snapshotter_battle_tests.sh run-runc-pods runc

      - name: Check for known issues in logs
        if: always()
        run: bash tests/integration/kubernetes/nydus_snapshotter_battle_tests.sh check-issues true

      - name: Collect full logs on failure
        if: failure()
        run: bash tests/integration/kubernetes/nydus_snapshotter_battle_tests.sh collect-logs
